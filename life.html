<script>
(function () {
  var wrap = document.querySelector('.scale-wrap');
  var box = document.querySelector('.container');

  function fit() {
    var scale = Math.min(1, wrap.clientWidth / box.offsetWidth);
    box.style.transform = 'scale(' + scale + ')';
    wrap.style.height = (box.offsetHeight * scale) + 'px';
  }

  window.addEventListener('resize', fit);
  window.addEventListener('load', fit);
  fit();

  new MutationObserver(fit).observe(box, { childList: true, subtree: true });
})();
</script>

<div style="position:absolute;width:0px;height:0px;overflow:hidden;">
<iframe id="yt-frame" width="1" height="1" frameborder="0" allow="autoplay"></iframe>
</div>
<div class="music-widget" id="music-widget">
<button class="music-toggle" id="music-toggle" type="button">♪ play music</button>
</div>
<script>
  var ytFrame = document.getElementById('yt-frame');
  var ytBase = 'https://www.youtube.com/embed/rV08uG_jt5o?autoplay=1&loop=1&playlist=rV08uG_jt5o&controls=0&playsinline=1';
  var toggleBtn = document.getElementById('music-toggle');
  var widget = document.getElementById('music-widget');
  var ytPlaying = false;

  function startMusic(resumeSeconds) {
    var src = ytBase;
    if (resumeSeconds) {
      src += '&start=' + Math.floor(resumeSeconds);
    }
    ytFrame.src = src;
    toggleBtn.textContent = '♪ pause music';
    ytPlaying = true;
    localStorage.setItem('musicPlaying', '1');
    localStorage.setItem('musicStartedAt', Date.now() - (resumeSeconds ? resumeSeconds * 1000 : 0));
  }

  function stopMusic() {
    ytFrame.src = '';
    toggleBtn.textContent = '♪ play music';
    ytPlaying = false;
    localStorage.setItem('musicPlaying', '0');
  }

  toggleBtn.addEventListener('click', function () {
    if (ytPlaying) {
      stopMusic();
    } else {
      startMusic();
    }
  });

  if (localStorage.getItem('musicPlaying') === '1') {
    var startedAt = parseInt(localStorage.getItem('musicStartedAt'), 10) || Date.now();
    startMusic((Date.now() - startedAt) / 1000);
  }

  (function () {
    var pageBox = document.querySelector('.container');

    function reposition() {
      var rect = pageBox.getBoundingClientRect();
      var sideSpace = window.innerWidth - rect.right;
      widget.style.display = sideSpace < 150 ? 'none' : 'flex';
    }

    window.addEventListener('resize', reposition);
    window.addEventListener('load', reposition);
    reposition();
  })();
</script>
