<!-- scales the .container down to fit the screen width on small devices, -->
<!-- keeping the exact same layout instead of reflowing it into one column. -->
<!-- re-runs on resize and whenever content inside changes (e.g. once supabase data loads in). -->
<script>
(function () {
  var wrap = document.querySelector('.scale-wrap');
  var box = document.querySelector('.container');

  function fit() {
    var scale = Math.min(1, wrap.clientWidth / box.offsetWidth);
    box.style.transform = 'scale(' + scale + ')';
    wrap.style.height = (box.offsetHeight * scale) + 'px';
  }

  window.addEventListener('resize', fit);
  window.addEventListener('load', fit);
  fit();

  new MutationObserver(fit).observe(box, { childList: true, subtree: true });
})();
</script>

<!-- background music widget. click to play/stop -- can't autoplay with sound -->
<!-- without a user gesture first, browsers block that. setting the iframe src -->
<!-- directly inside the click handler is more reliable than the postMessage-based -->
<!-- IFrame API, especially when testing from a file:// url. -->
<!-- localStorage remembers whether it was playing + roughly how far in, so clicking -->
<!-- a nav link to another page resumes close to where it left off (best-effort -- -->
<!-- this is a plain multi-page site, not a single-page app, so it can't be perfectly -->
<!-- seamless, and some browsers may still block the auto-resume without a fresh click). -->
<div class="music-widget" id="music-widget">
<div class="yt-frame-wrap">
<iframe id="yt-frame" width="200" height="113" frameborder="0" allow="autoplay"></iframe>
<button class="minimize-btn" id="minimize-btn" type="button" title="minimize">−</button>
</div>
<button class="music-toggle" id="music-toggle" type="button">♪ play music</button>
</div>
<script>
  var ytFrame = document.getElementById('yt-frame');
  var ytBase = 'https://www.youtube.com/embed/rV08uG_jt5o?autoplay=1&loop=1&playlist=rV08uG_jt5o&controls=0';
  var toggleBtn = document.getElementById('music-toggle');
  var widget = document.getElementById('music-widget');
  var minimizeBtn = document.getElementById('minimize-btn');
  var ytPlaying = false;

  function startMusic(resumeSeconds) {
    var src = ytBase;
    if (resumeSeconds) {
      src += '&start=' + Math.floor(resumeSeconds);
    }
    ytFrame.src = src;
    toggleBtn.textContent = '♪ pause music';
    ytPlaying = true;
    localStorage.setItem('musicPlaying', '1');
    localStorage.setItem('musicStartedAt', Date.now() - (resumeSeconds ? resumeSeconds * 1000 : 0));
  }

  function stopMusic() {
    ytFrame.src = '';
    toggleBtn.textContent = '♪ play music';
    ytPlaying = false;
    localStorage.setItem('musicPlaying', '0');
  }

  toggleBtn.addEventListener('click', function () {
    if (ytPlaying) {
      stopMusic();
    } else {
      startMusic();
    }
  });

  if (localStorage.getItem('musicPlaying') === '1') {
    var startedAt = parseInt(localStorage.getItem('musicStartedAt'), 10) || Date.now();
    startMusic((Date.now() - startedAt) / 1000);
  }

  function setMinimized(min) {
    widget.classList.toggle('minimized', min);
    minimizeBtn.textContent = min ? '+' : '−';
    localStorage.setItem('musicMinimized', min ? '1' : '0');
  }

  minimizeBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    setMinimized(!widget.classList.contains('minimized'));
  });

  setMinimized(localStorage.getItem('musicMinimized') === '1');

  /* moves the widget to the bottom-center if there isn't enough room beside */
  /* the page card to show it without overlapping */
  (function () {
    var pageBox = document.querySelector('.container');

    function reposition() {
      var rect = pageBox.getBoundingClientRect();
      var sideSpace = window.innerWidth - rect.right;
      widget.classList.toggle('music-widget--bottom', sideSpace < 220);
    }

    window.addEventListener('resize', reposition);
    window.addEventListener('load', reposition);
    reposition();
  })();
</script>
